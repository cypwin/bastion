# BASTION — Batch Affinity Scheduler for Throttled Inference on Ollama Networks
# Default broker configuration.
#
# VRAM sizes measured via nvidia-smi with models loaded.
# See config/broker.example.yaml for a minimal starter config.

# ── Ollama backend ──────────────────────────────────────────────────
ollama:
  host: "127.0.0.1"
  port: 11435              # Where Ollama actually listens (moved from 11434)
  api_timeout_seconds: 5   # Timeout for /api/ps queries
  unload_timeout_seconds: 10  # Timeout for model unload requests

# ── Broker server ───────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 11434              # Standard Ollama port — clients connect here transparently
  # admin_port: 9999       # Separate admin+A2A port (uncomment for two-port mode)
                           # When set and different from port, /broker/* and /a2a/*
                           # routes move to this port; proxy stays on port 11434.

# ── GPU safety thresholds ───────────────────────────────────────────
# Derived from crash investigation (see reference/CRASH_ROOT_CAUSE.md)
gpu:
  total_vram_gb: 32        # Physical VRAM (adjust for your GPU)
  headroom_gb: 8           # Reserved for OS, display, CUDA overhead, KV cache
  # max_vram_gb computed as total - headroom = 24 GB
  max_temperature_c: 82    # Block model loads above this
  max_power_watts: 450     # Block model loads above this (adjust for your GPU TDP)
  default_vram_estimate_gb: 10  # VRAM estimate for unknown models
  nvidia_smi_timeout_seconds: 5  # nvidia-smi subprocess timeout

# ── Scheduling algorithm ────────────────────────────────────────────
scheduler:
  cooldown_seconds: 2.0    # Mandatory pause between model transitions
  model_affinity_bonus: 10 # Priority boost for currently-loaded model
  aging_rate: 2.0          # Priority points gained per second of waiting
  max_queue_size: 512      # Reject with 503 above this
  residency_cache_ttl_seconds: 1.0  # TTL for model residency cache (S3)
  ollama_max_loaded_models: 4       # Max models co-resident in VRAM
  loop_interval_seconds: 0.1        # Scheduler wake-up interval
  error_backoff_seconds: 1.0        # Backoff after scheduler loop error
  gpu_unsafe_backoff_seconds: 5.0   # Backoff when GPU health check fails
  shutdown_timeout_seconds: 10.0    # Max time to wait for scheduler stop
  # Swap rate limiter — prevents PCIe power transient crashes on high-end NVIDIA GPUs.
  # Thresholds should be set below the observed crash rate for your hardware.
  swap_rate_window_seconds: 60.0         # Rolling window for swap counting
  swap_rate_warn_threshold: 4            # Start throttling early (half of crash rate)
  swap_rate_critical_threshold: 6        # Hard brake — 2-3 swaps below crash rate
  swap_rate_warn_cooldown_seconds: 5.0   # Cooldown at warn level
  swap_rate_critical_cooldown_seconds: 10.0  # Cooldown at critical level
  max_concurrent_dispatches: 3  # Max concurrent inference dispatches to co-resident models (was 4)
  concurrent_dispatch_delay_seconds: 0.1  # Stagger concurrent dispatches by 100ms to reduce GPU power transients
  queue_ttl_seconds: 600  # Max age for queued requests before sweep (10 min)

# ── Proxy settings ────────────────────────────────────────────────
proxy:
  inference_timeout_seconds: 300  # HTTP timeout for Ollama inference
  connect_timeout_seconds: 10     # HTTP connect timeout
  queue_timeout_seconds: 300      # Max wait in queue before 504
  max_request_body_bytes: 10485760  # 10 MB max request body

# ── Priority tiers ──────────────────────────────────────────────────
priorities:
  interactive: 100         # ollama run, Claude Code MCP (user-facing)
  agent: 50                # AI agents, A2A clients
  pipeline: 25             # Batch pipelines (extract, ingest, reassess)
  background: 10           # Night cycle, consolidation, embedding

# ── Known models ────────────────────────────────────────────────────
# VRAM sizes measured via nvidia-smi with q8_0 KV cache at configured
# default_num_ctx. Includes model weights + KV cache overhead.
models:
  "qwen3:30b-a3b-instruct-2507-q4_K_M":
    vram_gb: 19.5
    default_num_ctx: 8192   # Secondary reviewer: ~1700 tokens needed
    tags: ["primary", "secondary_reviewer", "jury_anchor"]

  "qwen3:14b":
    vram_gb: 9.8
    default_num_ctx: 8192   # Research/introspection: up to ~4000 tokens
    tags: ["fast", "summarization"]

  "qwen3:8b":
    vram_gb: 5.5
    default_num_ctx: 4096   # HyDE/classification: ~500 tokens needed
    tags: ["ultra_fast", "batch"]

  "phi4:14b-q4_K_M":
    vram_gb: 9.5
    default_num_ctx: 4096
    tags: ["jury_member2"]

  "mistral-nemo:12b":
    vram_gb: 8.5              # measured: council total 18.75 GB - granite - llama
    default_num_ctx: 4096   # Council: ~1400 tokens needed
    tags: ["jury_member3", "council"]

  "granite3.1-dense:8b":
    vram_gb: 5.75             # measured: 5886 MB at num_ctx=4096, q8_0 KV
    default_num_ctx: 4096   # Council: ~1400 tokens needed
    tags: ["council", "extraction_alt"]

  "llama3.1:8b":
    vram_gb: 4.5              # measured: council total - granite - mistral
    default_num_ctx: 4096   # Council: ~1400 tokens needed
    tags: ["council"]

  "qwen2.5-coder:7b":
    vram_gb: 4.7
    default_num_ctx: 4096   # Backup juror: ~500 tokens needed
    tags: ["code"]

  "nuextract":
    vram_gb: 2.2
    default_num_ctx: 4096
    tags: ["extraction"]

  "phi4-reasoning:14b":
    vram_gb: 8.0
    default_num_ctx: 8192
    tags: ["reasoning"]

  "qwen3:30b-a3b-thinking-2507-q4_K_M":
    vram_gb: 18.63
    default_num_ctx: 8192
    tags: ["reasoning", "thinking"]

  "nemotron-3-nano":
    vram_gb: 6.0
    default_num_ctx: 8192
    tags: ["long_context"]

  "nomic-embed-text":
    vram_gb: 0.4
    always_allowed: true    # Never counts toward VRAM budget — always resident
    tags: ["embedding"]
  # NOTE: Workloads E/F (pattern/fact extraction) explicitly pass num_ctx=16384
  # in their requests — client override wins, so default_num_ctx is irrelevant.

# ── Session profiles ─────────────────────────────────────────────────
# Named pipeline profiles for intent declaration.
# Maps pipeline stages to model sequences and priority tiers.
session_profiles:
  council_pipeline:
    model_sequence:
      - "qwen3:30b-a3b-instruct-2507-q4_K_M"
      - "phi4:14b-q4_K_M"
      - "mistral-nemo:12b"
      - "qwen3:30b-a3b-instruct-2507-q4_K_M"
    default_priority: "interactive"
    description: "4-model council deliberation with jury vote"

  extraction_pipeline:
    model_sequence:
      - "nuextract"
      - "qwen3:8b"
    default_priority: "pipeline"
    description: "Document extraction and summarization"

  embedding_pipeline:
    model_sequence:
      - "nomic-embed-text"
    default_priority: "background"
    description: "Background embedding and indexing"

# ── Audit logging ──────────────────────────────────────────────────
# Tiered audit events written to /tmp/bastion-audit.jsonl.
# Tier 1 (always on): timestamps, request_id, identity hashes, model, operation,
#         token counts, latency, status.
# Tier 2 (default):   Tier 1 + SHA-256 content hashes of prompt/response.
# Tier 3 (opt-in):    Tier 2 + full prompt/response text (debugging only).
audit:
  tier: 2                # Default tier (1, 2, or 3)
  content_hashing: true  # Enable SHA-256 content hashes at tier >= 2

# ── Authentication ─────────────────────────────────────────────────
# When enabled, /broker/* endpoints require Bearer token in Authorization header.
# Proxy routes (/api/*) remain open for Ollama clients.
auth:
  enabled: false
  api_keys: []             # Add tokens here: ["sk-bastion-secret1", "sk-bastion-secret2"]

# ── Rate limiting ─────────────────────────────────────────────────
rate_limit:
  enabled: false
  requests_per_minute: 60  # Per client IP
  burst: 10                # Max burst before throttling

# ── Circuit breaker ───────────────────────────────────────────────
circuit_breaker:
  enabled: true
  failure_threshold: 5     # Consecutive failures before opening
  recovery_timeout: 30.0   # Seconds before half-open probe

# ── Telemetry (OpenTelemetry) ───────────────────────────────────────
# When enabled and opentelemetry packages are installed, emits trace spans
# for task submission, queue wait, model swaps, and Ollama inference calls.
# Install with: pip install opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp
telemetry:
  enabled: false
  exporter: "none"           # "none", "console", "otlp"
  endpoint: ""               # OTLP endpoint, e.g. "http://localhost:4317"
  service_name: "bastion"

# ── A2A Agent Interface ──────────────────────────────────────────────
# When enabled, BASTION exposes A2A protocol endpoints at /a2a/*
# for agent-to-agent task submission, batch inference, and model reservation.
a2a:
  enabled: true
  tokens: []               # Bearer tokens for /a2a/* routes. Empty = open access.
  reservation_max_requests: 100   # Max requests per model reservation
  reservation_timeout_seconds: 600  # 10 minutes — safety net for abandoned reservations
  task_ttl_seconds: 3600   # Completed tasks kept for 1 hour before cleanup
  max_batch_size: 50       # Max prompts in a single batch_infer task

# ── Safety overrides ────────────────────────────────────────────────
# Injected into ALL Ollama API requests. See reference/CRASH_ROOT_CAUSE.md.
request_overrides:
  use_mmap: false           # GPU crash prevention on high-end NVIDIA GPUs
                            # OLLAMA_MMAP env var does NOT exist — per-request is the only way
