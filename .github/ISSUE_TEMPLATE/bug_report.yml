name: Bug Report
description: Report a bug in BASTION
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can
        reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start BASTION with `python -m bastion`
        2. Send a request to ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include any error messages or logs.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. Ubuntu 24.04, Arch Linux, Fedora 41
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `python --version`
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: e.g. RTX 5090 32 GB, RTX 4090 24 GB
    validations:
      required: true

  - type: input
    id: ollama_version
    attributes:
      label: Ollama version
      description: Output of `ollama --version`
    validations:
      required: true

  - type: input
    id: bastion_version
    attributes:
      label: BASTION version
      description: Output of `python -m bastion --version` or git commit hash
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or config excerpts.
    validations:
      required: false
