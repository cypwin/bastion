name: Feature Request
description: Suggest a new feature or improvement for BASTION
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like and why.

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear and concise description of the feature.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: |
        Describe the problem this solves or the workflow it improves.
        Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Have you considered any workarounds or alternative approaches?
        If so, describe them here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.
    validations:
      required: false
