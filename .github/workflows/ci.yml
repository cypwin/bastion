name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,dashboard,a2a,metrics,persistence]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Metric cardinality lint
        # Enforce the Prometheus label permitted-set (spec Section 3 rule #2):
        # fails the build on any per-PID/per-id label in metrics.py.
        run: python scripts/check_metric_cardinality.py

      - name: Type check
        run: mypy src/bastion --ignore-missing-imports --no-strict-optional

      - name: Test
        # Coverage gate ratchet across the test campaign:
        #   Phase 0  (CI hardening)     : 58 — honest floor, prevents regression
        #   Phase 1  (P1 fills)         : 64
        #   Phase 2  (dashboard)        : 78
        #   Phase 3  (behavioral depth) : 79 — current actual ~79.9%
        # Future work raises this further as server.py /a2a/* and the
        # remaining dashboard collectors get exercised.
        run: pytest tests/ -v --ignore=tests/test_e2e_stress.py --cov=src/bastion --cov-report=term-missing --cov-fail-under=79

      - name: Test bastion-client package
        working-directory: clients/bastion-client
        run: pip install -e . && pytest tests/ -v
