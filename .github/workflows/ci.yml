name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,dashboard,a2a,metrics,persistence]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        # TODO: fix existing type errors then remove `|| true`
        run: mypy src/bastion --ignore-missing-imports --no-strict-optional || true

      - name: Test
        run: pytest tests/ -v --ignore=tests/test_e2e_stress.py

      - name: Test bastion-client package
        working-directory: clients/bastion-client
        run: pip install -e . && pytest tests/ -v
