name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,dashboard,a2a,metrics,persistence]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/bastion --ignore-missing-imports --no-strict-optional

      - name: Test
        # Coverage gate ratchets up across the test campaign:
        #   Phase 0  (now)    : 58  — honest current floor, prevents regression
        #   Phase 1  (after P1 fills): 70
        #   Phase 2  (after dashboard): 75
        #   Phase 3+ (after behavioral depth): 80
        run: pytest tests/ -v --ignore=tests/test_e2e_stress.py --cov=src/bastion --cov-report=term-missing --cov-fail-under=58

      - name: Test bastion-client package
        working-directory: clients/bastion-client
        run: pip install -e . && pytest tests/ -v
