# BASTION — Minimal Example Configuration
#
# Copy this file to config/broker.yaml and adjust for your hardware.
# All values shown are safe defaults. Uncomment and change as needed.
#
# Full reference: config/broker.yaml (all options documented)
# Architecture:   docs/architecture.md
# API reference:  docs/api.md

# ── Ollama backend ──────────────────────────────────────────────────
# BASTION proxies to Ollama on this address. Move Ollama off port 11434
# so BASTION can listen there instead.
ollama:
  host: "127.0.0.1"
  port: 11435              # Ollama's actual port (moved from default 11434)

# ── Broker server ───────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 11434              # Standard Ollama port — clients connect here
  # admin_port: 9999       # Uncomment for two-port mode (admin on separate port)

# ── GPU safety thresholds ───────────────────────────────────────────
# Set total_vram_gb to 0 (default) to auto-detect from nvidia-smi.
# Usable VRAM = total_vram_gb - headroom_gb
gpu:
  total_vram_gb: 0         # 0 = auto-detect from nvidia-smi
  headroom_gb: 6           # Reserved for OS, display, CUDA overhead
  max_temperature_c: 83    # Block model loads above this temperature

# ── Scheduling algorithm ────────────────────────────────────────────
scheduler:
  cooldown_seconds: 2.0    # Pause between model transitions
  model_affinity_bonus: 10 # Priority boost for currently loaded model
  aging_rate: 2.0          # Priority points gained per second waiting
  max_queue_size: 512      # Reject with 503 above this

  # Swap-velocity circuit breaker — the sensor-independent crash backstop.
  # Bounds how fast BASTION cold-loads models (rapid loads cause the GPU power
  # transients that hard-lock the host). Defaults are a conservative floor for
  # an unknown card; run `bastion --stress-test` to calibrate refill/bucket up.
  swap_brake:
    enabled: true              # hard to disable; the backstop for fail-open gates
    min_spacing_seconds: 8.0   # min seconds between cold loads (inrush floor)
    bucket_capacity: 3.0       # burst tolerance (calibrated: safe_burst_depth)
    refill_per_minute: 5.0     # sustained safe velocity (calibrated: safe_swap_rate_per_min)
    count_evictions: true      # an evict+load swap spends ~2 tokens

  # Detect Ollama keep_alive=-1 pins so BASTION stops fighting (evicting) them.
  pin_detection:
    enabled: true
    expires_horizon_seconds: 3600.0  # /api/ps expires_at beyond now+this ⇒ pinned

# ── Proxy settings ──────────────────────────────────────────────────
proxy:
  inference_timeout_seconds: 300  # Max time for a single inference call
  queue_timeout_seconds: 300      # Max time waiting in queue before 504

# ── Priority tiers ──────────────────────────────────────────────────
priorities:
  interactive: 100         # User-facing (ollama run, Claude Code MCP)
  agent: 50                # AI agents
  pipeline: 25             # Batch pipelines
  background: 10           # Background jobs

# ── Known models ────────────────────────────────────────────────────
# Register your models with VRAM usage for accurate scheduling.
# Run `bastion --detect-models` to auto-discover installed Ollama models.
#
# Don't have models yet?  Browse https://ollama.com/library and install with:
#   ollama pull llama3.1:8b
#   ollama pull nomic-embed-text
#
# Example entries (uncomment and adjust vram_gb after measuring):
# models:
#   "llama3.1:8b":
#     vram_gb: 4.5
#     default_num_ctx: 4096
#     tags: ["general"]
#   "nomic-embed-text":
#     vram_gb: 0.4
#     always_allowed: true   # Never counts toward VRAM budget
#     tags: ["embedding"]
models: {}

# ── Safety overrides ────────────────────────────────────────────────
# Injected into ALL Ollama API requests.
request_overrides:
  use_mmap: false          # Prevents GPU crashes from mmap on some hardware

# ── Persistence (optional SQLite storage) ──────────────────────────
# Requires: pip install bastion-broker[persistence]
# Stores audit events, task state, and optionally queue entries in SQLite
# for recovery after restart. In-memory stores remain primary — SQLite
# is a durable archive and recovery source.
#
# persistence:
#   enabled: true
#   # database_path: ""          # Empty = auto (~/.local/share/bastion/bastion.db)
#   persist_audit: true          # Dual-write audit events to SQLite
#   persist_tasks: true          # Persist A2A task state for recovery
#   persist_queue: false         # Opt-in: persist queue entries for recovery
#   queue_recovery_ttl: 300      # Seconds — entries older than this discarded on startup

# ── Optional features (disabled by default) ─────────────────────────
# Uncomment to enable:

# auth:
#   enabled: true
#   api_keys: ["sk-your-secret-key"]

# a2a:
#   enabled: true
#   tokens: []             # Empty = open access to A2A endpoints

# circuit_breaker:
#   enabled: true
#   failure_threshold: 5
#   recovery_timeout: 30.0

# audit:
#   tier: 2

# telemetry:
#   enabled: true
#   exporter: "otlp"
#   endpoint: "http://localhost:4317"

# Complexity-based model routing (M58). Clients tag requests with an
# X-Task-Complexity header (simple / moderate / complex); the broker fills
# in a routed model for requests that omit one. With the default
# override_explicit: false an explicit model in the request body always
# wins; set true to force-route over explicit choices.
# complexity_routing:
#   enabled: true
#   routes:
#     simple: "small-model:tag"      # cheap classification / extraction
#     moderate: "medium-model:tag"   # summarization / evaluation
#   override_explicit: false
#   complex_action: "reject"         # HTTP 422 — route complex work elsewhere

# ── Observability (Prometheus / Grafana) ───────────────────────────
# Scrape hint for prometheus.yml generation. BASTION itself does not
# read this — it is documentation for operators and the docker-compose stack.
observability:
  metrics_path: "/metrics"
  scrape_interval_seconds: 15
  # BASTION_OTLP_ENDPOINT env var activates OTLP export in telemetry.py.
  # Set to empty string (default) to disable. See WT-E5.
  otlp_endpoint_env: "BASTION_OTLP_ENDPOINT"
